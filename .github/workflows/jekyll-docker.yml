name: Jekyll using Docker image
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  jekyll:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    container:
      image: jekyll/builder:4.2.2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect Jekyll site
        id: detect_jekyll
        shell: bash
        run: |
          if [ -f _config.yml ] || [ -f _config.yaml ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Jekyll site
        if: steps.detect_jekyll.outputs.found == 'true'
        run: jekyll build --future

      - name: Skip Jekyll build
        if: steps.detect_jekyll.outputs.found != 'true'
        run: echo "No Jekyll config file found; skipping Jekyll workflow."
