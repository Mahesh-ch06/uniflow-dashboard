name: Playwright Tests
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Detect Playwright specs
        id: detect_specs
        shell: bash
        run: |
          if find . -path ./node_modules -prune -o -type f \( -name "*.spec.ts" -o -name "*.spec.tsx" -o -name "*.e2e.ts" -o -name "*.e2e.tsx" \) -print | grep -q .; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Playwright tests
        if: steps.detect_specs.outputs.found == 'true'
        run: npx playwright test

      - name: Skip Playwright run
        if: steps.detect_specs.outputs.found != 'true'
        run: echo "No Playwright specs found; skipping e2e test run."

      - name: Upload Playwright report
        if: ${{ always() && steps.detect_specs.outputs.found == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
