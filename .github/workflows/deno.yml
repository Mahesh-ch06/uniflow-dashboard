name: Deno
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect Deno project
        id: detect_deno
        shell: bash
        run: |
          if [ -f deno.json ] || [ -f deno.jsonc ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Deno
        if: steps.detect_deno.outputs.found == 'true'
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: Format check
        if: steps.detect_deno.outputs.found == 'true'
        run: deno fmt --check

      - name: Lint
        if: steps.detect_deno.outputs.found == 'true'
        run: deno lint

      - name: Test
        if: steps.detect_deno.outputs.found == 'true'
        run: deno test --allow-all

      - name: Skip Deno checks
        if: steps.detect_deno.outputs.found != 'true'
        run: echo "No deno.json/deno.jsonc found; skipping Deno workflow."
