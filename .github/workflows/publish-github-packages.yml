name: Publish Node.js Package to GitHub Packages
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish-gpr:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: https://npm.pkg.github.com

      - name: Install dependencies
        run: npm install

      - name: Validate package metadata for GitHub Packages
        id: validate_pkg
        run: |
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json','utf8'));const name=String(p.name||'');const isPrivate=Boolean(p.private);const isScoped=name.startsWith('@');const publishable=!isPrivate&&isScoped;console.log('publishable='+publishable);if(!publishable){console.log('reason=package must be non-private and scoped (e.g. @owner/name) for GitHub Packages.');}" > pkg-check.txt
          if grep -q "publishable=true" pkg-check.txt; then
            echo "publishable=true" >> "$GITHUB_OUTPUT"
          else
            echo "publishable=false" >> "$GITHUB_OUTPUT"
          fi
          cat pkg-check.txt

      - name: Publish to GitHub Packages
        if: steps.validate_pkg.outputs.publishable == 'true'
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip publish
        if: steps.validate_pkg.outputs.publishable != 'true'
        run: echo "Skipping GitHub Packages publish due to package metadata requirements."
